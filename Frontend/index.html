<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar chord</title>
</head>
<body>
    <div class="header">
        <p id="text">Sellect the strings u wanna play.</p>
    </div>

    <div class="audio-input">
        <p id="status">Click a string from the list and play the guitar.</p> <br>
        <p id="Detected: "><span id="detected-note"></span></p> <br>
        <p id="Frequency: "><span id="Frequency"></span></p>
        
    </div>

    <div class="strings">
        <button id="Eh" data-string="Eh">Eh</button>
        <button id="A" data-string="A">A</button>
        <button id="D" data-string="D">D</button>
        <button id="G" data-string="G">G</button>
        <button id="B" data-string="B">B</button>
        <button id="El" data-string="El">El</button>
    </div>
    <script src="audio_processing.js"></script>
</body>
</html>
