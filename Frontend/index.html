<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar chord</title>
</head>
<body>
    <div class="header">
        <p id="text">Sellect the strings u wanna play.</p>
    </div>

    <div class="audio-input">
        <p id="status">Click a string from the list and play the guitar.</p>
        <p id="Detected: "><span id="detected-note"></span></p>
        <p id="Frequency: "><span id="Frequency"></span></p>
        <button id="stop">Stop</button>
        
    </div>

    <div class="strings">
        <button id="Eh">El</button>
        <button id="A">A</button>
        <button id="D">D</button>
        <button id="G">G</button>
        <button id="B">B</button>
        <button id="El">Eh</button>
    </div>
    <script src="audio_processing.js"></script>
</body>
</html>
